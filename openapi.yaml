openapi: 3.1.1
info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestionar autores y posts con Node.js, Express y PostgreSQL.

servers:
  - url: http://localhost:3000
    description: Servidor local
  - url: https://proyectom2matiasgaitan-production.up.railway.app
    description: Servidor en Railway

tags:
  - name: Authors
    description: Operaciones sobre autores
  - name: Posts
    description: Operaciones sobre posts
  - name: Comments
    description: Operaciones sobre comentarios

paths:
  /authors:
    get:
      summary: Listar autores
      tags:
        - Authors
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Crear autor
      tags:
        - Authors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Autor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email ya utilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /authors/{id}:
    get:
      summary: Obtener autor por ID
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: Actualizar autor
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorUpdate'
      responses:
        '200':
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Email ya utilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: Eliminar autor
      tags:
        - Authors
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Autor eliminado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /posts:
    get:
      summary: Listar posts
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Crear post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Author asociado no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /posts/{id}:
    get:
      summary: Obtener post por ID
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: Actualizar post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: Eliminar post
      tags:
        - Posts
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Post eliminado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /posts/author/{author_id}:
    get:
      summary: Listar posts por author_id
      description: Devuelve posts junto con datos del autor asociado.
      tags:
        - Posts
      parameters:
        - name: author_id
          in: path
          required: true
          description: ID del autor
          schema:
            type: integer
      responses:
        '200':
          description: Posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostWithAuthor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /comments:
    get:
      summary: Listar comentarios
      tags:
        - Comments
      responses:
        '200':
          description: Lista de comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Crear comentario
      tags:
        - Comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
      responses:
        '201':
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Author o post asociado no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /comments/{id}:
    get:
      summary: Obtener comentario por ID
      tags:
        - Comments
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: Actualizar comentario
      tags:
        - Comments
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentUpdate'
      responses:
        '200':
          description: Comentario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: Eliminar comentario
      tags:
        - Comments
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Comentario eliminado
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: ID del recurso
      schema:
        type: integer

  responses:
    BadRequest:
      description: Datos invalidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string

    AuthorUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        author_id:
          type: integer
        published:
          type: boolean
        created_at:
          type: string
          format: date-time

    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
        content:
          type: string
        author_id:
          type: integer
        published:
          type: boolean
          default: false

    PostUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        author_id:
          type: integer
        published:
          type: boolean

    PostWithAuthor:
      type: object
      properties:
        post_id:
          type: integer
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
        post_created_at:
          type: string
          format: date-time
        author_id:
          type: integer
        author_name:
          type: string
        author_email:
          type: string
          format: email
        author_bio:
          type: string
          nullable: true

    Comment:
      type: object
      properties:
        id:
          type: integer
        comment_content:
          type: string
        author_id:
          type: integer
        post_id:
          type: integer
        created_at:
          type: string
          format: date-time

    CommentInput:
      type: object
      required:
        - comment_content
        - author_id
        - post_id
      properties:
        comment_content:
          type: string
        author_id:
          type: integer
        post_id:
          type: integer

    CommentUpdate:
      type: object
      properties:
        comment_content:
          type: string
        author_id:
          type: integer
        post_id:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer
